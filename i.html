<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini POS Pro+</title>
<link rel="stylesheet" href="design.css">
</head>

<body>

<!-- LEFT -->
<div class="products">
  <div class="header">💳 Mini POS Pro+</div>
  <input class="search" placeholder="Search product..." onkeyup="searchProduct(this.value)">

  <div class="grid" id="productList"></div>
</div>

<!-- RIGHT -->
<div class="cart">
  <h2>🛒 Cart <span class="badge" id="cartCount">0</span></h2>

  <div class="cart-items" id="cartItems"></div>

  <div class="summary">
    <div class="total" id="total">₱0</div>
    <button class="btn checkout" onclick="checkout()">Checkout & Print</button>
    <button class="btn clear" onclick="clearCart()">Clear</button>
  </div>
</div>
<script src="script.js"></script>

</body>
</html>
